<!DOCTYPE html>

<html>

<head>

  <title>Neon Underground Arcade</title>

  <style>

    body{margin:0;background:#050008;color:#00f3ff;font-family:"Courier New",monospace;text-align:center}

    h1{color:#bc13fe;text-shadow:0 0 20px #bc13fe;font-size:42px}

    button,input{font-family:inherit;padding:12px;margin:7px;border-radius:8px;border:2px solid #00f3ff;background:#080010;color:#00f3ff}

    button{cursor:pointer;box-shadow:0 0 12px #00f3ff}

    button:hover{background:#bc13fe;color:white}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;padding:25px}

    .card{border:2px solid #bc13fe;border-radius:15px;padding:20px;box-shadow:0 0 18px #bc13fe;background:#120018}

    #game{max-width:850px;margin:20px auto;padding:20px;border:2px solid #00f3ff;box-shadow:0 0 20px #00f3ff;border-radius:15px}

    .big{font-size:28px}

    canvas{background:#000;border:2px solid #bc13fe;box-shadow:0 0 20px #bc13fe}

  </style>

</head>

<body>

<h1>NEON UNDERGROUND ARCADE</h1>

<p>10 neon games. No music. Pure fun.</p>

<div id="menu" class="grid"></div>

<div id="game"></div>

<script>

let games=[

["Neon Tap","Tap as fast as you can in 10 seconds!",tapGame],

["Reaction Flash","Click only when it says CLICK!",reactionGame],

["Memory Glow","Match the emoji pairs!",memoryGame],

["Math Blaster","Solve fast math problems!",mathGame],

["Word Scramble","Unscramble the word!",wordGame],

["Color Rush","Pick the color, not the word!",colorGame],

["Dodge Cube","Dodge falling neon blocks!",dodgeGame],

["Guess Code","Guess the secret number!",guessGame],

["Aim Trainer","Click the moving target!",aimGame],

["Cyber Quiz","Answer quick questions!",quizGame]

];

let menu=document.getElementById("menu");

let game=document.getElementById("game");

games.forEach((g,i)=>{

  menu.innerHTML+=`

    <div class="card">

      <h2>${g[0]}</h2>

      <p>${g[1]}</p>

      <button onclick="games[${i}][2]()">PLAY NOW</button>

    </div>`;

});

function back(){

  game.innerHTML="";

}

function tapGame(){

  let score=0;

  let time=10;

  game.innerHTML=`

    <h2>Neon Tap</h2>

    <p>Time: <span id="t">${time}</span></p>

    <p class="big">Score: <span id="s">0</span></p>

    <button onclick="score++;s.innerText=score">TAP!</button>

    <br><button onclick="back()">Back</button>`;

  let timer=setInterval(()=>{

    time--;

    t.innerText=time;

    if(time<=0){

      clearInterval(timer);

      alert("Final score: "+score);

    }

  },1000);

}

function reactionGame(){

  game.innerHTML=`

    <h2>Reaction Flash</h2>

    <p>Wait until the button changes.</p>

    <button id="rbtn">WAIT...</button>

    <br><button onclick="back()">Back</button>`;

  let ready=false;

  let start=0;

  rbtn.onclick=()=>{

    if(!ready){alert("Too early!");return;}

    alert("Reaction time: "+(Date.now()-start)+" ms");

  };

  setTimeout(()=>{

    ready=true;

    start=Date.now();

    rbtn.innerText="CLICK NOW!";

    rbtn.style.background="lime";

    rbtn.style.color="black";

  },Math.random()*3000+1500);

}

function memoryGame(){

  let icons=["🚀","👾","💎","🔥","⚡","🌙"];

  let cards=[...icons,...icons].sort(()=>Math.random()-0.5);

  let first=null;

  let lock=false;

  let found=0;

  game.innerHTML=`<h2>Memory Glow</h2><div id="board" class="grid"></div><button onclick="back()">Back</button>`;

  cards.forEach((c,i)=>{

    board.innerHTML+=`<button id="c${i}" onclick="flip(${i},'${c}')">?</button>`;

  });

  window.flip=(i,c)=>{

    let btn=document.getElementById("c"+i);

    if(lock || btn.innerText!="?") return;

    btn.innerText=c;

    if(!first){

      first=[i,c];

    } else {

      if(first[1]===c){

        found++;

        first=null;

        if(found===icons.length) alert("You win!");

      } else {

        lock=true;

        setTimeout(()=>{

          btn.innerText="?";

          document.getElementById("c"+first[0]).innerText="?";

          first=null;

          lock=false;

        },700);

      }

    }

  };

}

function mathGame(){

  let score=0;

  let time=30;

  let a,b,ans;

  game.innerHTML=`

    <h2>Math Blaster</h2>

    <p>Time: <span id="mt">30</span></p>

    <p id="q"></p>

    <input id="answer">

    <button onclick="checkMath()">OK</button>

    <p>Score: <span id="ms">0</span></p>

    <button onclick="back()">Back</button>`;

  function newQ(){

    a=Math.ceil(Math.random()*20);

    b=Math.ceil(Math.random()*20);

    ans=a+b;

    q.innerText=a+" + "+b+" = ?";

    answer.value="";

  }

  window.checkMath=()=>{

    if(Number(answer.value)===ans){

      score++;

      ms.innerText=score;

      newQ();

    }

  };

  newQ();

  let timer=setInterval(()=>{

    time--;

    mt.innerText=time;

    if(time<=0){

      clearInterval(timer);

      alert("Score: "+score);

    }

  },1000);

}

function wordGame(){

  let words=["NEON","CYBER","ARCADE","GHOST","LASER","POWER"];

  let w=words[Math.floor(Math.random()*words.length)];

  let scr=w.split("").sort(()=>Math.random()-0.5).join("");

  game.innerHTML=`

    <h2>Word Scramble</h2>

    <p class="big">${scr}</p>

    <input id="word">

    <button onclick="alert(word.value.toUpperCase()==='${w}'?'Correct!':'Try again!')">Check</button>

    <br><button onclick="back()">Back</button>`;

}

function colorGame(){

  let colors=["red","blue","green","yellow","purple"];

  let real=colors[Math.floor(Math.random()*colors.length)];

  let fake=colors[Math.floor(Math.random()*colors.length)];

  game.innerHTML=`

    <h2>Color Rush</h2>

    <p>Click the COLOR of the word, not what the word says.</p>

    <h1 style="color:${real}">${fake}</h1>

    ${colors.map(c=>`<button onclick="alert('${real}'==='${c}'?'Correct!':'Wrong!')">${c}</button>`).join("")}

    <br><button onclick="back()">Back</button>`;

}

function dodgeGame(){

  game.innerHTML=`

    <h2>Dodge Cube</h2>

    <p>Move your mouse or finger to dodge blocks.</p>

    <canvas id="can" width="360" height="360"></canvas>

    <br><button onclick="back()">Back</button>`;

  let ctx=can.getContext("2d");

  let x=170;

  let blocks=[];

  let score=0;

  let run=true;

  can.onmousemove=e=>x=e.offsetX-15;

  can.ontouchmove=e=>{

    x=e.touches[0].clientX-can.getBoundingClientRect().left-15;

  };

  function loop(){

    if(!run)return;

    ctx.clearRect(0,0,360,360);

    ctx.fillStyle="#00f3ff";

    ctx.fillRect(x,330,30,30);

    if(Math.random()<0.04) blocks.push({x:Math.random()*330,y:0});

    ctx.fillStyle="#bc13fe";

    blocks.forEach(b=>{

      b.y+=4;

      ctx.fillRect(b.x,b.y,30,30);

      if(b.y>310 && b.x<x+30 && b.x+30>x){

        run=false;

        alert("Game over! Score: "+score);

      }

    });

    score++;

    requestAnimationFrame(loop);

  }

  loop();

}

function guessGame(){

  let secret=Math.ceil(Math.random()*50);

  let tries=0;

  game.innerHTML=`

    <h2>Guess Code</h2>

    <p>Guess a number from 1 to 50</p>

    <input id="gnum">

    <button onclick="tries++;let n=Number(gnum.value);alert(n===${secret}?'Correct in '+tries+' tries!':n<${secret}?'Too low':'Too high')">Guess</button>

    <br><button onclick="back()">Back</button>`;

}

function aimGame(){

  let score=0;

  game.innerHTML=`

    <h2>Aim Trainer</h2>

    <p>Score: <span id="as">0</span></p>

    <div id="target" style="position:relative;margin:20px auto;width:300px;height:300px;border:2px solid #00f3ff">

      <button id="dot" onclick="score++;as.innerText=score;move()" style="position:absolute">🎯</button>

    </div>

    <button onclick="back()">Back</button>`;

  window.move=()=>{

    dot.style.left=Math.random()*240+"px";

    dot.style.top=Math.random()*240+"px";

  };

  move();

}

function quizGame(){

  let qs=[

    ["2 + 2?", "4"],

    ["Color of the sky?", "blue"],

    ["Opposite of cold?", "hot"],

    ["HTML makes a?", "website"],

    ["Fast animal: cheetah or turtle?", "cheetah"]

  ];

  let q=qs[Math.floor(Math.random()*qs.length)];

  game.innerHTML=`

    <h2>Cyber Quiz</h2>

    <p>${q[0]}</p>

    <input id="qa">

    <button onclick="alert(qa.value.toLowerCase()==='${q[1]}'?'Correct!':'Wrong!')">Answer</button>

    <br><button onclick="back()">Back</button>`;

}

</script>

</body>

</html>
